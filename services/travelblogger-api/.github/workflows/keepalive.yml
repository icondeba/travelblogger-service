name: Keep-Alive Ping

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://travelblogger-service-ebdnd3aahbfuc7hx.centralindia-01.azurewebsites.net/api/health)
          echo "Health endpoint returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS — function may be cold starting"
          fi
